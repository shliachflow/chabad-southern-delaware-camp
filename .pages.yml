media:
  input: uploads
  output: uploads
  rename: safe
  extensions: [jpg, jpeg, png, webp]

content:
  - name: site
    label: Site Settings
    type: file
    path: content/site.json
    format: json
    fields:
      - name: seo
        label: SEO & Sharing
        type: object
        fields:
          - { name: site_title, label: Site Title, type: string }
          - { name: site_description, label: Meta Description, type: text }
          - { name: photos_title, label: Photos Page Title, type: string }
          - { name: photos_description, label: Photos Page Description, type: text }
          - { name: registration_title, label: Registration Page Title, type: string }
          - { name: registration_description, label: Registration Page Description, type: text }
          - { name: share_image, label: Share Image, type: image }
          - { name: site_url, label: Public Site URL, type: string }

      - name: hero
        label: Hero Section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow Text, type: string }
          - { name: headline_1, label: Headline Line 1, type: string }
          - { name: headline_2, label: Headline Line 2, type: string }
          - { name: headline_3, label: Headline Line 3, type: string }
          - { name: image, label: Hero Image, type: image }
          - { name: subtitle, label: Subtitle, type: text }
          - { name: callout_title, label: Hero Photo Callout Title, type: string }
          - { name: callout_body, label: Hero Photo Callout Body, type: string }
          - { name: fact_1_value, label: Fact Box 1 Value, type: string }
          - { name: fact_1_label, label: Fact Box 1 Label, type: string }
          - { name: fact_2_value, label: Fact Box 2 Value, type: string }
          - { name: fact_2_label, label: Fact Box 2 Label, type: string }
          - { name: fact_3_value, label: Fact Box 3 Value, type: string }
          - { name: fact_3_label, label: Fact Box 3 Label, type: string }
          - { name: fact_4_value, label: Fact Box 4 Value, type: string }
          - { name: fact_4_label, label: Fact Box 4 Label, type: string }

      - name: camp_details
        label: Camp Dates, Times & Pricing
        type: object
        fields:
          - { name: start_date, label: Camp Start Date, type: string }
          - { name: end_date, label: Camp End Date, type: string }
          - { name: age_range, label: Age Range, type: string }
          - { name: daily_start_time, label: Daily Start Time, type: string }
          - { name: daily_end_time, label: Daily End Time, type: string }
          - { name: days, label: Days, type: string }
          - { name: early_bird_price, label: Early Bird Price, type: string }
          - { name: regular_price, label: Regular Price, type: string }
          - { name: location, label: Public Location, type: string }
          - { name: director_line, label: Director Line, type: string }
          - { name: session_image, label: Camp Details Image, type: image }

      - name: cta
        label: Buttons & Links
        type: object
        fields:
          - { name: hero_button_text, label: Hero Button Text, type: string }
          - { name: hero_button_url, label: Hero Button URL, type: string }
          - { name: floating_button_text, label: Floating Button Text, type: string }
          - { name: floating_button_url, label: Floating Button URL, type: string }
          - { name: registration_button_text, label: Registration Section Button Text, type: string }
          - { name: registration_button_url, label: Registration Section Button URL, type: string }

      - name: visibility
        label: Show / Hide Sections
        type: object
        fields:
          - { name: show_activities, label: Show Activities, type: boolean }
          - { name: show_camp_details, label: Show Camp Details, type: boolean }
          - { name: show_faq, label: Show FAQ, type: boolean }
          - { name: show_registration, label: Show Registration Section, type: boolean }
          - { name: show_floating_button, label: Show Floating Button, type: boolean }

      - name: sections
        label: Section Headings
        type: object
        fields:
          - { name: activities_eyebrow, label: Activities Eyebrow, type: string }
          - { name: activities_headline, label: Activities Headline, type: string }
          - { name: activities_headline_emphasis, label: Activities Headline Emphasis, type: string }
          - { name: activities_body, label: Activities Body Text, type: text }
          - { name: faq_eyebrow, label: FAQ Eyebrow, type: string }
          - { name: faq_headline, label: FAQ Headline, type: string }
          - { name: faq_headline_emphasis, label: FAQ Headline Emphasis, type: string }
          - { name: faq_body, label: FAQ Body Text, type: text }

      - name: registration
        label: Registration Page
        type: object
        fields:
          - { name: notice, label: Top Notice, type: text }
          - { name: heading, label: Heading, type: string }
          - { name: message, label: Message, type: text }
          - { name: button_text, label: Button Text, type: string }
          - { name: button_url, label: Button URL, type: string }
          - { name: embed_code, label: Cognito Embed Code, type: text }
          - { name: admin_note, label: Admin Note, type: string }

      - name: activities
        label: What Happens At Camp
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - { name: title, label: Activity Title, type: string }
          - { name: badge, label: Short Badge, type: string }
          - { name: image, label: Activity Image, type: image }
          - { name: image_alt, label: Activity Image Alt Text, type: string }
          - { name: description, label: Activity Description, type: text }

      - name: photos
        label: Photos / Social Section
        type: object
        fields:
          - { name: eyebrow, label: Section Eyebrow, type: string }
          - { name: headline, label: Headline, type: string }
          - { name: headline_emphasis, label: Headline Emphasis, type: string }
          - { name: body, label: Body Text, type: text }
          - { name: callout_title, label: Callout Title, type: string }
          - { name: callout_body, label: Callout Body, type: text }

      - name: contact
        label: Contact & Social
        type: object
        fields:
          - { name: email, label: Main Email Address, type: string }
          - { name: phone, label: Main Phone, type: string }
          - { name: address, label: Public Location, type: string }
          - { name: rabbi_name, label: Rabbi Name, type: string }
          - { name: rabbi_phone, label: Rabbi Phone, type: string }
          - { name: rabbi_email, label: Rabbi Email, type: string }
          - { name: chanale_name, label: Chanale Name, type: string }
          - { name: chanale_phone, label: Chanale Phone, type: string }
          - { name: chanale_email, label: Chanale Email, type: string }
          - { name: instagram, label: Instagram URL, type: string }
          - { name: facebook, label: Facebook URL, type: string }

      - name: faq
        label: FAQ Items
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{question}"
        fields:
          - { name: question, label: Question, type: string }
          - { name: answer, label: Answer, type: text }

  - name: gallery
    label: Photo Albums
    type: file
    path: content/gallery.json
    format: json
    fields:
      - name: albums
        label: Albums
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - { name: title, label: Album Title, type: string }
          - { name: date, label: Date, type: string }
          - { name: cover, label: Cover Photo, type: image }
          - { name: count, label: Photo Count, type: number }
          - { name: description, label: Album Description, type: text }
          - name: photos
            label: Photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{caption}"
            fields:
              - { name: image, label: Photo, type: image }
              - { name: caption, label: Caption, type: string }
