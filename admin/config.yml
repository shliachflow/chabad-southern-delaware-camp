# ============================================================
# Decap CMS Configuration
# Kosher Camp Southern Delaware
# Admin panel: /admin
# ============================================================
# SETUP REQUIRED:
#   1. Set your backend. For GitHub Pages / Netlify:
#      - backend: name: git-gateway  (Netlify Identity)
#      OR
#      - backend: name: github
#        repo: YOUR_GITHUB_USERNAME/chabad-southern-delaware-camp
#        branch: master
#   2. Set media_folder to where uploads should go
#   3. Visit /admin to manage content
# ============================================================

site_url: https://shliachflow.github.io/chabad-southern-delaware-camp

backend:
  name: github
  repo: shliachflow/chabad-southern-delaware-camp
  branch: master

# Where uploaded images are stored
media_folder: "uploads"
public_folder: "uploads"

# The CMS UI will live at /admin
# ------------------------------------------------------------

collections:

  # ── SITE SETTINGS ─────────────────────────────────────────
  # All core text content: hero, camp details, activities, contact, FAQs
  - name: "site"
    label: "Site Settings"
    files:

      - name: "main"
        label: "Main Site Content"
        file: "content/site.json"
        format: json
        fields:

          # ── HERO SECTION ──────────────────────────────────
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow Text (above headline)", name: "eyebrow", widget: "string",
                  hint: "e.g. 'Chabad of Southern Delaware · Summer 2026'" }
              - { label: "Headline Line 1", name: "headline_1", widget: "string",
                  hint: "First word of the big hero headline, e.g. 'Cook.'" }
              - { label: "Headline Line 2", name: "headline_2", widget: "string",
                  hint: "Second word, e.g. 'Bake.'" }
              - { label: "Headline Line 3 (accent color)", name: "headline_3", widget: "string",
                  hint: "Third phrase shown in gold, e.g. 'Have fun.'" }
              - { label: "Hero Image", name: "image", widget: "image",
                  hint: "Main banner image used behind the hero text." }
              - { label: "Subtitle / Description", name: "subtitle", widget: "text",
                  hint: "The paragraph under the headline." }
              - label: "Fact Box 1"
                name: "fact_1_value"
                widget: "string"
                hint: "Large value, e.g. 'Aug 3-7'"
              - { label: "Fact Box 1 Label", name: "fact_1_label", widget: "string",
                  hint: "Small label, e.g. 'One week only'" }
              - { label: "Fact Box 2 Value", name: "fact_2_value", widget: "string",
                  hint: "e.g. '9 AM-3 PM'" }
              - { label: "Fact Box 2 Label", name: "fact_2_label", widget: "string",
                  hint: "e.g. 'Daily hours'" }
              - { label: "Fact Box 3 Value", name: "fact_3_value", widget: "string",
                  hint: "e.g. '$250'" }
              - { label: "Fact Box 3 Label", name: "fact_3_label", widget: "string",
                  hint: "e.g. 'Per child'" }
              - { label: "Fact Box 4 Value", name: "fact_4_value", widget: "string",
                  hint: "e.g. '$300'" }
              - { label: "Fact Box 4 Label", name: "fact_4_label", widget: "string",
                  hint: "e.g. 'Regular price'" }

          # ── CAMP DETAILS / PRICING ────────────────────────
          - label: "Camp Dates, Times & Pricing"
            name: "camp_details"
            widget: "object"
            fields:
              - { label: "Camp Start Date", name: "start_date", widget: "string",
                  hint: "e.g. 'August 3, 2026'" }
              - { label: "Camp End Date", name: "end_date", widget: "string",
                  hint: "e.g. 'August 7, 2026'" }
              - { label: "Daily Start Time", name: "daily_start_time", widget: "string",
                  hint: "e.g. '9:00 AM'" }
              - { label: "Daily End Time", name: "daily_end_time", widget: "string",
                  hint: "e.g. '3:00 PM'" }
              - { label: "Days", name: "days", widget: "string",
                  hint: "e.g. 'Monday-Friday'" }
              - { label: "Early Bird Price", name: "early_bird_price", widget: "string",
                  hint: "e.g. '$250'" }
              - { label: "Regular Price", name: "regular_price", widget: "string",
                  hint: "e.g. '$300'" }
              - { label: "Location", name: "location", widget: "string",
                  hint: "e.g. 'Chabad of Southern Delaware, Lewes, DE'" }
              - { label: "Camp Details Image", name: "session_image", widget: "image",
                  hint: "Image shown in the Camp Details section." }

          # ── ACTIVITY CARDS ─────────────────────────────────
          - label: "What Happens At Camp"
            name: "activities"
            widget: "list"
            max: 4
            hint: "Use only confirmed activities."
            fields:
              - { label: "Activity Title", name: "title", widget: "string" }
              - { label: "Short Badge", name: "badge", widget: "string", required: false,
                  hint: "Small label on the card, e.g. Mix, Bake, Play, Grow." }
              - { label: "Activity Image", name: "image", widget: "image", required: false,
                  hint: "Photo shown on this activity card." }
              - { label: "Activity Description", name: "description", widget: "text" }

          # ── PHOTOS SECTION ────────────────────────────────
          - label: "Photos / Social Section"
            name: "photos"
            widget: "object"
            fields:
              - { label: "Section Eyebrow", name: "eyebrow", widget: "string",
                  hint: "e.g. 'Latest From Camp'" }
              - { label: "Headline", name: "headline", widget: "string",
                  hint: "e.g. 'Camp photos'" }
              - { label: "Headline Emphasis (italic)", name: "headline_emphasis", widget: "string",
                  hint: "e.g. 'coming soon.'" }
              - { label: "Body Text", name: "body", widget: "text" }
              - { label: "Callout Title", name: "callout_title", widget: "string",
                  hint: "e.g. 'Photo albums live here.'" }
              - { label: "Callout Body", name: "callout_body", widget: "text" }

          # ── CONTACT INFO ──────────────────────────────────
          - label: "Contact & Social"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email Address", name: "email", widget: "string",
                  hint: "e.g. Rabbi@JewishSouthernDelaware.com" }
              - { label: "Phone", name: "phone", widget: "string", required: false,
                  hint: "e.g. (302) 377-1162" }
              - { label: "Public Location", name: "address", widget: "string", required: false,
                  hint: "e.g. Chabad of Southern Delaware, Lewes, DE" }
              - { label: "Rabbi Name", name: "rabbi_name", widget: "string", required: false }
              - { label: "Rabbi Phone", name: "rabbi_phone", widget: "string", required: false }
              - { label: "Rabbi Email", name: "rabbi_email", widget: "string", required: false }
              - { label: "Chanale Name", name: "chanale_name", widget: "string", required: false }
              - { label: "Chanale Phone", name: "chanale_phone", widget: "string", required: false }
              - { label: "Chanale Email", name: "chanale_email", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string",
                  hint: "Full URL, e.g. https://www.instagram.com/chabadsoutherndelaware/" }
              - { label: "Facebook URL", name: "facebook", widget: "string",
                  hint: "Full URL, e.g. https://www.facebook.com/chabadsoutherndelaware/" }

          # ── FAQ ───────────────────────────────────────────
          - label: "FAQ Items"
            name: "faq"
            widget: "list"
            max: 4
            hint: "Add, edit, or reorder frequently asked questions. Keep to four or fewer."
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

  # ── PHOTO ALBUMS ──────────────────────────────────────────
  # Manages the gallery.json file — add albums that appear on photos.html
  - name: "gallery"
    label: "Photo Albums"
    files:

      - name: "albums"
        label: "All Albums"
        file: "content/gallery.json"
        format: json
        fields:
          - label: "Albums"
            name: "albums"
            widget: "list"
            hint: "Each album appears as a card on the Photos page. Add one per camp day or special event."
            fields:
              - { label: "Album Title", name: "title", widget: "string",
                  hint: "e.g. 'Day 1 — Cooking Workshop'" }
              - { label: "Date", name: "date", widget: "string",
                  hint: "Display date, e.g. 'August 3, 2026'" }
              - { label: "Cover Photo", name: "cover", widget: "image",
                  hint: "Upload a cover image for this album (will appear in uploads/ folder).",
                  required: false }
              - { label: "Photo Count (optional)", name: "count", widget: "number",
                  required: false, hint: "e.g. 24 — shown as '24 photos' under the title" }
              - { label: "Album Description (optional)", name: "description", widget: "text",
                  required: false }
              - label: "Photos"
                name: "photos"
                widget: "list"
                required: false
                hint: "Upload photos for this album. The cover photo is used if no photos are added."
                fields:
                  - { label: "Photo", name: "image", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
