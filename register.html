  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FFFAEE;
      --cream-dark: #FFF2DF;
      --primary: #E8650A;
      --primary-dark: #9F3F05;
      --secondary: #D99A1E;
      --navy: #171C2E;
      --muted: #6F6872;
      --ocean: var(--primary);
      --gold: var(--secondary);
      --font-h: 'Barlow Condensed', 'Arial Narrow', 'Impact', sans-serif;
      --font-b: 'Nunito', system-ui, sans-serif;
    }
    html { height: 100%; overflow: auto; overflow-x: hidden; }
    body { margin: 0; height: 100%; display: flex; flex-direction: column; font-family: var(--font-b); background: var(--cream); overflow-x: hidden; color: var(--navy); }
    a { color: inherit; text-decoration: none; }

    .topbar {
      flex-shrink: 0;
      width: 100vw;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 0 clamp(16px, 4vw, 36px);
      background: var(--navy);
      color: #fff;
      border-bottom: 4px solid var(--primary);
      max-width: 100vw; overflow: hidden;
    }
    .brand {
      font-family: var(--font-h); font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: .02em;
      color: #fff; display: flex; align-items: center; gap: 8px;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .brand em { color: var(--gold); font-style: normal; }
    a.brand { text-decoration: none; }
    .back {
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 36px; padding: 8px 16px;
      border-radius: 6px; background: var(--primary);
      border: 2px solid rgba(255,255,255,.12);
      color: #fff; font-size: 12px; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase;
      transition: background 150ms;
      white-space: nowrap;
    }
    .back:hover { background: rgba(255,255,255,.25); }

    .reg-wrap {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
      width: 100vw; max-width: 100vw;
    }
    .reg-notice {
      background: var(--cream-dark); border-bottom: 2px solid var(--navy);
      padding: 12px clamp(16px,4vw,36px);
      font-size: 13px; font-weight: 700; color: #2C3E50; line-height: 1.5;
      text-align: center;
      overflow-wrap: anywhere; word-break: break-word;
      width: 100vw; max-width: 100vw;
    }
    .reg-notice strong { color: var(--primary); }

    .reg-fallback {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; gap: 20px;
      padding: 40px 24px; text-align: center;
      background:
        linear-gradient(90deg, rgba(232,101,10,.05) 1px, transparent 1px) 0 0 / 42px 42px,
        var(--cream);
      width: 100vw; max-width: 100vw; overflow: auto;
    }
    .reg-fallback-title {
      font-family: var(--font-h); font-size: clamp(48px,8vw,82px);
      font-weight: 900; text-transform: uppercase; letter-spacing: .01em;
      color: var(--primary); line-height: .9; max-width: min(100%, 640px); overflow-wrap: anywhere; word-break: break-word;
      text-shadow: 3px 3px 0 rgba(217,154,30,.32);
    }
    .reg-fallback-body { font-size: 16px; color: #5D7A8A; line-height: 1.65; max-width: 480px; }
    .reg-fallback a,
    .reg-fallback p,
    .reg-fallback-body,
    .reg-fallback-note { overflow-wrap: anywhere; word-break: break-word; max-width: 100%; }
    .reg-fallback-note {
      font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); background: rgba(255,255,255,.82);

    .reg-btn {

      letter-spacing: .1em; text-transform: uppercase;
      border: 2px solid var(--primary-dark); transition: all 150ms;

    .reg-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
    #registrationEmbed {

    @media (max-width: 520px) {

  <div class="reg-wrap">
    <div class="reg-notice" id="registrationNotice">
      <strong>Kosher Culinary Camp 2026</strong> · August 3-7 · 9:00 AM - 3:00 PM · $250 early bird / $300 regular
    </div>

    <!-- REGISTRATION FORM: Replace this comment with Cognito Form embed code.
         Cognito Forms is the client's existing tool. -->

    <div class="reg-fallback" id="registrationFallback">
      <div class="reg-fallback-title" id="registrationHeading">Register for Camp</div>
      <div class="reg-fallback-body" id="registrationMessage">
        Complete the secure registration form below.
      </div>
      <div id="registrationEmbed"></div>
      <div class="reg-fallback-note" id="registrationNote">
        Need help? Contact Chanale at 718-473-6570 or Chanale@JewishSouthernDelaware.com.
      </div>
    </div>
  </div>
<script>
fetch('content/site.json')
  .then(function(r){ return r.json(); })
  .then(function(site) {
    var seo = site.seo || {};
    var siteUrl = (seo.site_url || window.location.origin).replace(/\/$/, '');
    var shareImage = seo.share_image || 'uploads/hero-banner.webp';
    if (!/^https?:\/\//i.test(shareImage)) shareImage = siteUrl + '/' + shareImage.replace(/^\//, '');
    if (seo.registration_title) document.title = seo.registration_title;
    document.querySelectorAll('meta[property="og:title"], meta[name="twitter:title"]').forEach(function(el) {
      if (seo.registration_title) el.setAttribute('content', seo.registration_title);
    });
    document.querySelectorAll('meta[name="description"], meta[property="og:description"], meta[name="twitter:description"]').forEach(function(el) {
      if (seo.registration_description) el.setAttribute('content', seo.registration_description);
    });
    document.querySelectorAll('meta[property="og:image"], meta[name="twitter:image"]').forEach(function(el) {
      el.setAttribute('content', shareImage);
    });
    var reg = site.registration || {};
    function text(id, value) {
      if (!value) return;
      var el = document.getElementById(id);
      if (el) el.textContent = value;
    }
    text('registrationNotice', reg.notice);
    text('registrationHeading', reg.heading);
    text('registrationMessage', reg.message);
    text('registrationNote', reg.admin_note);
    function renderEmbed(target, embedCode) {
      if (!target || !embedCode) return;
      target.innerHTML = '';
      target.style.width = 'min(100%, 840px)';

      var template = document.createElement('template');
      template.innerHTML = embedCode.trim();
      Array.prototype.slice.call(template.content.childNodes).forEach(function(node) {
        if (node.nodeName && node.nodeName.toLowerCase() === 'script') {
          var script = document.createElement('script');
          Array.prototype.slice.call(node.attributes).forEach(function(attr) {
            script.setAttribute(attr.name, attr.value);
          });
          script.text = node.textContent || '';
          target.appendChild(script);
        } else {
          target.appendChild(node.cloneNode(true));
        }
      });
    }
    var embed = document.getElementById('registrationEmbed');
    if (embed && reg.embed_code) {
      renderEmbed(embed, reg.embed_code);
    }
  })
  .catch(function(){});

</script>
